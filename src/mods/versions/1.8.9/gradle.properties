# Origin Client — legacy FORGE build for Minecraft 1.8.9 (the PvP-era legacy
# version; MCP mappings, GuiScreen/Tessellator rendering — pre-GlStateManager-
# rework, pre-GuiGraphics by seven years). This module does NOT consume
# src/mods/shared (Mojmap/modern-Fabric source can't compile here) — it is a
# from-scratch re-implementation of the Origin surfaces against the 1.8.9 API,
# kept visually identical to the shared design spec. Marked .no-shared-sync.
#
# Install model (the Lunar model for legacy): the launcher installs Forge
# 11.15.1.2318 quietly + this jar + OptiFine HD_U_M5 (shaders + the only real
# perf layer that exists for 1.8.9) from LegacyStackInstaller. No mixins —
# every Origin surface hangs off Forge events (GuiOpenEvent /
# RenderGameOverlayEvent), so there is no mixin-apply failure class at all.
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true
org.gradle.configuration-cache=false

loom.platform=forge

minecraft_version=1.8.9
forge_version=1.8.9-11.15.1.2318-1.8.9
mcp_mappings=de.oceanlabs.mcp:mcp_stable:22-1.8.9

mod_version=0.4.1
maven_group=com.origin
