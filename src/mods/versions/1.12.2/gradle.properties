# Origin Client — legacy FORGE build for Minecraft 1.12.2 (the last of the
# pre-flattening modded era; MCP mappings, GuiScreen/BufferBuilder rendering).
# This module does NOT consume src/mods/shared (Mojmap/modern-Fabric source
# can't compile here) — it is the same from-scratch legacy re-implementation as
# the 1.8.9 module, with the small 1.12.2 API deltas (BufferBuilder,
# event getters, fontRenderer field name). Marked .no-shared-sync.
#
# Install model (the Lunar model for legacy): the launcher installs Forge
# 14.23.5.2860 quietly + this jar + OptiFine HD_U_G5 (shaders) + the 1.12.2
# Forge perf stack (FoamFix, Phosphor, VanillaFix, TexFix, BetterFps) from
# LegacyStackInstaller. No mixins — every Origin surface hangs off Forge
# events, so there is no mixin-apply failure class at all.
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true
org.gradle.configuration-cache=false

loom.platform=forge

minecraft_version=1.12.2
# Dev toolchain pin: 2847 is the last 1.12.2 build publishing the old-format
# `userdev` classifier that legacy loom consumes (2860 only has userdev3), and
# it's the exact build OptiFine HD_U_G5 lists as its tested Forge. The
# LAUNCHER installs 2860 at runtime (final 1.12.2 build, network-security fix)
# — same 14.23.5 mod API, zero source delta.
forge_version=1.12.2-14.23.5.2847
# stable_39 is published against 1.12 and applies to the whole 1.12.x line —
# there is no 39-1.12.2 artifact.
mcp_mappings=de.oceanlabs.mcp:mcp_stable:39-1.12

mod_version=0.4.1
maven_group=com.origin
