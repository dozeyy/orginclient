# Origin Client — Fabric build for Minecraft 1.16.5 (covers 1.16.5 only).
# OLDEST / hardest target: Java 8 bytecode + fixed-function GL (no
# RenderSystem.setShader*/setShaderTexture/setShaderColor — those are 1.17+).
# Pre-GuiGraphics module: all drawing goes through the Gfx wrapper
# (PoseStack + GuiComponent statics + TextureManager.bind + color4f). Forked
# from staged/1.18.2 (TextComponent/TranslatableComponent factories, no
# OptionInstance, pre-signature chat) plus the fixed-function GL rewrite and a
# full Java-8 language/library downgrade, hence .no-shared-sync. Java 8.
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true
org.gradle.configuration-cache=false

minecraft_version=1.16.5
loader_version=0.19.3
loom_version=1.17-SNAPSHOT

mod_version=0.4.1
maven_group=com.origin

fabric_api_version=0.42.0+1.16
